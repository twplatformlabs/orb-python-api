# src/executors/circleci-executor-builder.yaml
# yamllint disable rule:line-length
---

description: >
  By default, orb-python-api releasex job uses ghcr.io/twplatformlabs/circleci-executor-builder, an alpine based CircleCI
  executor. The executor includes standard tools for tagging and signing manifestes.

parameters:

  executor-image-name:
    description: Specify circleci remote-docker executor image.
    type: string

  resource-class:
    description: Executor resource class.
    type: enum
    enum: [medium, medium+, large, xlarge, 2xlarge, 2xlarge+]

  registry-login:
    description: Environment variable containing Username for reigstry access. Default is DOCKER_LOGIN.
    type: env_var_name
    default: DOCKER_LOGIN

  registry-password:
    description: Environment variable containing Password for reigstry access. Default is DOCKER_PASSWORD.
    type: env_var_name
    default: DOCKER_PASSWORD

resource_class: << parameters.resource-class >>

docker:
  - image: << parameters.executor-image-name >>
    auth:
      username: ${<< parameters.registry-login >>}
      password: ${<< parameters.registry-password >>}
